name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  SITE_NAME: ${{ vars.SITE_NAME }}
  BASE_URL: ${{ vars.BASE_URL }}
  SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
  ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT }}
  CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create site config
        run: |
          python3 - <<'PY'
          import json, os
          config = {
              "site_name": os.getenv("SITE_NAME") or "ToolMint",
              "base_url": os.getenv("BASE_URL") or "https://example.pages.dev",
              "support_email": os.getenv("SUPPORT_EMAIL") or "support@example.com",
              "adsense_client": os.getenv("ADSENSE_CLIENT") or "",
              "enable_auto_ads": False,
              "enable_manual_placeholders": True,
              "brand_color": "#6d5efc",
          }
          with open("site_config.json", "w", encoding="utf-8") as f:
              json.dump(config, f, indent=2)
          PY

      - name: Build static site
        run: python3 build.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
